<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<title>For Kat</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<div class="background"></div>

<!-- LANDING -->

<section id="landing">

<div class="content">

<p class="small">FOR</p>

<h1>Kat</h1>

<p class="subtitle">There's something I'd like to share with you.</p>

<p class="subtitle light">Whenever you're ready.</p>

</div>

</section>

<!-- ENVELOPE -->

<section id="envelope" style="display:none;">

<div class="content">

<div class="mail">

<div class="back"></div>

<div class="flap"></div>

<div class="seal">
BJDB
</div>

</div>

<p class="subtitle" style="margin-top:50px;">
Tap the seal
</p>

</div>

</section>

<script src="script.js"></script>
